services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: portal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - portal_db:/var/lib/postgresql/data

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/app/uploads:/app/app/uploads

  frontend:
    image: node:20
    working_dir: /app
    volumes:
      - ./frontend:/app
    environment:
      - NEXT_PUBLIC_API_BASE=http://localhost:8000
    command: bash -lc "npm install && npm run dev -- -p 3000"
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  portal_db:
